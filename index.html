    {l:"Form (TSB)",     v:(dTSB>=0?"+":"")+dTSB, c:freshColor, sub:"Fitness − Fatigue"},
    {l:"Freshness",      v:freshLabel, c:freshColor, sub:mfff?"From TrainingPeaks":"Est. from logs", big:false},
  ].forEach(s=>{
    const d=el("div","stat-card");
    d.innerHTML=`<div class="stat-label">${s.l}</div>
      <div class="stat-val" style="color:${s.c};font-size:${s.big===false?'16px':'34px'}">${s.v}</div>

  });

  if(load.history.length>7){
    const hist=load.history.slice(-60);
    const fffWrap=el("div");
    fffWrap.innerHTML=lineChart(hist,"date",

  ovCard.innerHTML=`<div class="card-label">TrainingPeaks Override</div>
    <p style="font-size:14px;color:#7a8ba3;margin-bottom:14px">Paste your current CTL, ATL, and TSB from TrainingPeaks to override the auto-calculated values.</p>`;
  const ovForm=el("div");
  ovForm.style.cssText="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap";
  ovForm.innerHTML=`
    <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:#7a8ba3;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px">CTL<input id="ovCTL" type="number" placeholder="${load.ctl}" value="${mfff?mfff.ctl:''}" style="padding:7px 10px;border:1px solid #c9d5e3;border-radius:6px;width:75px;font-family:'JetBrains Mono',monospace;font-size:15px"/></label>
    <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:#7a8ba3;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px">ATL<input id="ovATL" type="number" placeholder="${load.atl}" value="${mfff?mfff.atl:''}" style="padding:7px 10px;border:1px solid #c9d5e3;border-radius:6px;width:75px;font-family:'JetBrains Mono',monospace;font-size:15px"/></label>
    <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:#7a8ba3;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px">TSB<input id="ovTSB" type="number" placeholder="${load.tsb}" value="${mfff?mfff.tsb:''}" style="padding:7px 10px;border:1px solid #c9d5e3;border-radius:6px;width:75px;font-family:'JetBrains Mono',monospace;font-size:15px"/></label>
    <button class="save-btn" id="saveFFF">Save TP Values</button>
    ${mfff?`<button class="save-btn" id="clearFFF" style="background:#7a8ba3">Use Auto-Calc</button>`:''}`;

  wrap.appendChild(ovCard);
  setTimeout(()=>{

    if(sf) sf.onclick=()=>{

      const atl=parseInt(document.getElementById("ovATL").value);
      const tsb=parseInt(document.getElementById("ovTSB").value);
      if(!isNaN(ctl)&&!isNaN(atl)&&!isNaN(tsb)){
        state.manualFFF={ctl,atl,tsb};

      }

    if(cf) cf.onclick=()=>{state.manualFFF=null;store.set("hyrox-manualfff-v1",null);renderAll();};

  const isRed    = dTSB<-15 || (dATL-dCTL)>25;
  const recColor = isRed?C.danger:isYellow?C.warn:C.success;
  const recLabel = isRed?"Slow Down — Take a Deload":isYellow?"Maintain — Train Smart This Week":"Continue Building — Full Send";

  recCard.innerHTML=`<div class="card-label">Training Recommendation & Metric Guide</div>`;
  recCard.appendChild(banner);

  // Metric deep-dives
  const metrics=[

      color:C.run,
      value:`${dCTL}`,
      unit:"AU",
      range:"HYROX target: 50–80 AU by race week",
      what:"CTL is your 42-day exponentially weighted average of daily training stress. Think of it as your aerobic engine — the bigger the number, the more work your body is adapted to handling.",
      ranges:[
        {lo:0,  hi:24,  label:"Low",      color:C.danger,  action:"Train consistently — 5 days/wk. Keep intensity low to moderate. Focus on building the habit before adding load."},
        {lo:25, hi:49,  label:"Building", color:C.warn,    action:"Good progress. Keep adding volume. One long run per week. Add one tempo or interval session. Don't jump more than 5–7% volume per week."},
        {lo:50, hi:79,  label:"Strong",   color:C.success, action:"Solid base. Layer in race-specific work: negative split runs, station circuits. Maintain volume — don't sacrifice it for intensity."},
        {lo:80, hi:999, label:"Elite",    color:C.z2,      action:"High fitness. Shift toward quality — race-pace intervals, full HYROX simulations. Begin tapering 3 weeks before race."},
      ],
      current:dCTL,
    },
    {
      label:"FATIGUE (ATL — Acute Training Load)",
      color:C.danger,
      value:`${dATL}`,
      unit:"AU",
      range:"Healthy: within 10–20 AU above CTL during build phases",
      what:"ATL is your 7-day rolling training stress — essentially how hard you've trained in the past week. High ATL means you're accumulating fatigue. ATL should naturally exceed CTL during hard training blocks, but the gap matters.",
      ranges:[
        {lo:0,   hi:dCTL-1,    label:"Below CTL", color:C.success, action:"Light week — you're recovering or deloading. Fatigue is low. Good time to do a quality session or race simulation if TSB is also positive."},
        {lo:dCTL,hi:dCTL+19,  label:"Productive", color:C.warn,   action:"Normal build zone. Training hard but not overreaching. Monitor sleep and recovery markers. Keep easy days truly easy."},
        {lo:dCTL+20,hi:999,   label:"High",       color:C.danger,  action:"Fatigue is spiking. Do not add more volume or intensity. Take 1–2 easy days, prioritize sleep (8+ hrs), and consider whether a deload week is needed."},
      ],
      current:dATL,
    },
    {
      label:"FORM (TSB — Training Stress Balance)",
      color:freshColor,
      value:`${dTSB>=0?"+":""}${dTSB}`,
      unit:"AU",
      range:"Race day target: +5 to +15 (via 2–3 week taper)",
      what:"TSB = CTL minus ATL. It tells you if you're fresh or fatigued right now. Negative means you're carrying fatigue (normal during training). Positive means you're rested and ready to perform. On race day you want TSB in the +5 to +15 range — that's what tapering achieves.",
      ranges:[
        {lo:10,  hi:999,  label:"Peaked",         color:C.success, action:"You're fresh and ready to race or do a hard time trial. Use this window for your best quality workout of the block or a race simulation. Don't let this sit too long — fitness decays if you don't train."},
        {lo:5,   hi:9,    label:"Fresh",           color:C.success, action:"Great position. Push quality work this week: intervals, tempo runs, or HYROX station benchmarks. You'll hit good numbers."},
        {lo:-5,  hi:4,    label:"Balanced",        color:C.warn,    action:"Normal training zone. Stick to your plan. No need to back off or add extra. This is where most of your training weeks should land."},
        {lo:-15, hi:-6,   label:"Building Fatigue",color:C.warn,    action:"You're accumulating fatigue — expected in a build phase. Don't add more load. Keep easy days easy. A deload week in the next 1–2 weeks is a good idea."},
        {lo:-999,hi:-16,  label:"Overreached",     color:C.danger,  action:"Stop adding load immediately. Take a full deload week: cut volume 30–40%, drop intensity, prioritize sleep and nutrition. Pushing through here risks injury and long-term regression."},
      ],
      current:dTSB,
    },
  ];

  const metricsWrap=el("div");
  metricsWrap.style.cssText="display:flex;flex-direction:column;gap:16px";

  metrics.forEach(m=>{
    const block=el("div");
    block.style.cssText=`border:1px solid ${m.color}30;border-radius:10px;overflow:hidden`;

    // Header
    const hdr=el("div");
    hdr.style.cssText=`display:flex;align-items:baseline;gap:10px;padding:12px 16px;background:${m.color}10;border-bottom:1px solid ${m.color}20`;
    hdr.innerHTML=`<span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:${m.color}">${m.label}</span><span style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:${m.color};margin-left:auto">${m.value}<span style="font-size:14px;margin-left:2px">${m.unit}</span></span>`;
    block.appendChild(hdr);

    // What it means
    const body=el("div");
    body.style.cssText="padding:12px 16px";
    const whatDiv=el("div");
    whatDiv.style.cssText="font-size:13px;color:#334155;line-height:1.7;margin-bottom:12px";
    whatDiv.textContent=m.what;
    body.appendChild(whatDiv);

    // Range target
    const rangeNote=el("div");
    rangeNote.style.cssText=`font-family:'JetBrains Mono',monospace;font-size:11px;color:${m.color};margin-bottom:10px`;
    rangeNote.textContent=`📍 ${m.range}`;
    body.appendChild(rangeNote);

    // Find active range
    const active=m.ranges.find(r=>m.current>=r.lo&&m.current<=r.hi)||m.ranges[m.ranges.length-1];
    const actionBox=el("div");
    actionBox.style.cssText=`padding:10px 14px;border-radius:7px;background:${active.color}12;border-left:3px solid ${active.color}`;
    actionBox.innerHTML=`<div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${active.color};text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Your status: ${active.label}</div><div style="font-size:13px;color:#334155;line-height:1.65">${active.action}</div>`;
    body.appendChild(actionBox);

    block.appendChild(body);
    metricsWrap.appendChild(block);
  });

  recCard.appendChild(metricsWrap);
  wrap.appendChild(recCard);

  return wrap;
}


// ── Training Plan ──────────────────────────────────────────────────────────
function buildTrainingPlan(){
  const wrap=el("div");
  const today=new Date(); today.setHours(0,0,0,0);
  const raceDate=new Date("2026-11-20"); raceDate.setHours(0,0,0,0);

  // ── Project CTL/ATL to race day using planned TSS ─────────────────────────
  const baseLoad=computeLoad();
  const mfff=state.manualFFF;
  let ctl=mfff?mfff.ctl:baseLoad.ctl;
  let atl=mfff?mfff.atl:baseLoad.atl;
  const kCTL=1/42, kATL=1/7;

  // Build a date→plannedTSS map for all future plan days
  const planTSSMap={};
  PLAN_WEEKS.forEach(w=>{
    w.days.forEach(d=>{
      if(d.tss>0) planTSSMap[d.date]=d.tss;
    });
  });

  // Simulate forward day by day to race day
  const projection=[];
  let cur=new Date(today);
  let simCTL=ctl, simATL=atl;
  while(cur<=raceDate){
    const ds=cur.toISOString().slice(0,10);
    const tss=planTSSMap[ds]||0;
    simCTL=simCTL+(tss-simCTL)*kCTL;
    simATL=simATL+(tss-simATL)*kATL;
    const tsb=Math.round(simCTL-simATL);
    projection.push({date:ds,tss,ctl:Math.round(simCTL),atl:Math.round(simATL),tsb});
    cur.setDate(cur.getDate()+1);
  }
  const raceDayProj=projection[projection.length-1];

  // ── Race Readiness Banner ─────────────────────────────────────────────────
  const rdCard=el("div","card");
  const rdTSB=raceDayProj.tsb;
  const rdCTL=raceDayProj.ctl;
  const rdColor=rdTSB>=5&&rdTSB<=15?C.success:rdTSB>15||rdTSB<0?C.warn:C.accent;
  const rdLabel=rdTSB>=5&&rdTSB<=15?"On Track — Race-day TSB in target window":rdTSB>15?"May be undertraining — TSB will be very high":rdTSB<0?"Risk — TSB projected negative on race day":"Close — adjust taper to hit +5–+15 TSB";
  rdCard.innerHTML=`<div class="card-label">Projected Race Readiness — Nov 20, 2026</div>`;
  const rdBanner=el("div");
  rdBanner.style.cssText=`display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px`;
  [
    {l:"Projected CTL",v:rdCTL,c:C.run,sub:"Race-day fitness"},
    {l:"Projected ATL",v:raceDayProj.atl,c:C.danger,sub:"Race-day fatigue"},
    {l:"Projected TSB",v:(rdTSB>=0?"+":"")+rdTSB,c:rdColor,sub:"Target: +5 to +15"},
    {l:"Weeks to Race",v:Math.ceil((raceDate-today)/(7*86400000)),c:C.accent,sub:"From today"},
  ].forEach(s=>{
    const d=el("div","stat-card");
    d.innerHTML=`<div class="stat-label">${s.l}</div><div class="stat-val" style="color:${s.c};font-size:28px">${s.v}</div><div class="stat-sub">${s.sub}</div>`;
    rdBanner.appendChild(d);
  });
  rdCard.appendChild(rdBanner);
  const rdAlert=el("div");
  rdAlert.style.cssText=`padding:10px 14px;border-radius:7px;background:${rdColor}12;border-left:3px solid ${rdColor};font-size:13px;color:#334155`;
  rdAlert.innerHTML=`<span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${rdColor};font-size:11px;text-transform:uppercase;letter-spacing:1px">Assessment: </span>${rdLabel}`;
  rdCard.appendChild(rdAlert);
  wrap.appendChild(rdCard);

  // ── Projected CTL/ATL/TSB curve ──────────────────────────────────────────
  const curveCard=el("div","card");
  curveCard.innerHTML=`<div class="card-label">CTL · ATL · TSB Projection to Race Day (if plan followed)</div>`;
  // Sample every 3 days for chart performance
  const chartProj=projection.filter((_,i)=>i%3===0||i===projection.length-1);
  const svgWrap=el("div");
  svgWrap.innerHTML=lineChart(chartProj,"date",
    [{key:"ctl",color:C.run,width:2.5,r:0},{key:"atl",color:C.danger,width:1.5,r:0,dashed:true},{key:"tsb",color:C.success,width:2,r:0}],
    null,chartW(),180,null,false,[{y:0,color:"#c9d5e3",label:"0"},{y:5,color:C.success+"66",label:"TSB +5"},{y:15,color:C.success+"33",label:"TSB +15"}]);
  svgWrap.innerHTML+=`<div style="display:flex;gap:20px;justify-content:center;margin-top:6px;font-size:12px;color:${C.dim}">
    <span>● <span style="color:${C.run}">Fitness (CTL)</span></span>
    <span>┄ <span style="color:${C.danger}">Fatigue (ATL)</span></span>
    <span>● <span style="color:${C.success}">Form (TSB)</span></span>
    <span style="color:${C.dim}">· Shaded band = ideal race-day TSB zone</span>
  </div>`;
  curveCard.appendChild(svgWrap);
  wrap.appendChild(curveCard);

  // ── Session type color key + legend ──────────────────────────────────────
  const typeColors={easy:C.z2,long:C.run,tempo:C.accent,interval:C.tss,racepace:"#e63946",sim:"#7c3aed",strength:"#64748b",station:C.hr,rest:"#e8eef6",race:"#e07b3c",other:C.dim,mobility:"#94a3b8"};
  const typeLabels={easy:"Easy Run",long:"Long Run",tempo:"Tempo",interval:"Intervals",racepace:"Race Pace",sim:"Hyrox Sim",strength:"Strength",station:"Station Work",rest:"REST",race:"RACE DAY",mobility:"Mobility"};

  // ── Weekly calendar (future weeks first, past weeks collapsed) ────────────
  const calCard=el("div","card");
  calCard.innerHTML=`<div class="card-label">34-Week Training Calendar — Planned Sessions & TSS</div>`;

  // Filter toggle
  const filterRow=el("div");
  filterRow.style.cssText="display:flex;gap:6px;margin-bottom:14px;align-items:center";
  const filterLabel=el("span");
  filterLabel.style.cssText=`font-size:11px;font-family:'JetBrains Mono',monospace;color:${C.dim};margin-right:4px;text-transform:uppercase;letter-spacing:1px`;
  filterLabel.textContent="Show:";
  filterRow.appendChild(filterLabel);
  [["upcoming","Upcoming"],["completed","Completed"],["all","All 34 Weeks"]].forEach(([val,lbl])=>{
    const btn=el("button");
    const isActive=state.calFilter===val;
    btn.style.cssText=`padding:4px 12px;border-radius:20px;border:1px solid ${isActive?C.accent:C.border};background:${isActive?C.accent:"transparent"};color:${isActive?"#fff":C.dim};font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;font-weight:${isActive?"700":"400"}`;
    btn.textContent=lbl;
    btn.onclick=()=>{state.calFilter=val;renderAll();};
    filterRow.appendChild(btn);
  });
  calCard.appendChild(filterRow);

  // Legend row
  const legendRow=el("div");
  legendRow.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px";
  Object.entries(typeLabels).forEach(([k,v])=>{
    if(k==='other') return;
    const chip=el("span");
    chip.style.cssText=`font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:10px;background:${typeColors[k]}22;color:${typeColors[k]};border:1px solid ${typeColors[k]}44`;
    chip.textContent=v;
    legendRow.appendChild(chip);
  });
  calCard.appendChild(legendRow);

  const visibleWeeks=PLAN_WEEKS.filter(w=>{
    const ws=new Date(w.startDate); ws.setHours(0,0,0,0);
    const we=new Date(ws); we.setDate(we.getDate()+6);
    if(state.calFilter==="completed") return we<today;
    if(state.calFilter==="upcoming") return we>=today;
    return true;
  });
  visibleWeeks.forEach(w=>{
    const wStart=new Date(w.startDate); wStart.setHours(0,0,0,0);
    const wEnd=new Date(wStart); wEnd.setDate(wEnd.getDate()+6);
    const isPast=wEnd<today;
    const isCurrent=wStart<=today&&today<=wEnd;

    const wWrap=el("div");
    wWrap.style.cssText=`margin-bottom:8px;border:1px solid ${isCurrent?C.accent:C.border};border-radius:8px;overflow:hidden;${isPast?"opacity:0.55":""}`;

    // Week header
    const phaseColors={"Phase 1":"#3b82f6","Phase 2":"#f59e0b","Phase 3":"#e07b3c","Phase 4":"#2a9d5c","Race Week":"#e04e6a"};
    const phaseColor=phaseColors[w.phase]||C.dim;
    const hdr=el("div");
    hdr.style.cssText=`display:flex;align-items:center;gap:10px;padding:8px 14px;background:${isCurrent?C.accent+"18":isPast?"#f8fafc":"#f4f6fa"};border-bottom:1px solid ${isCurrent?C.accent+"30":C.border}`;
    hdr.innerHTML=`
      <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${isCurrent?C.accent:C.dim}">W${w.week}</span>
      <span style="font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:10px;background:${phaseColor}22;color:${phaseColor}">${w.phase}</span>
      <span style="font-size:12px;color:#7a8ba3;font-family:'JetBrains Mono',monospace">${w.startDate.slice(5).replace("-","/")} – ${new Date(wStart.getTime()+5*86400000).toISOString().slice(5,10).replace("-","/")}</span>
      ${isCurrent?`<span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:${C.accent};font-weight:700">◀ THIS WEEK</span>`:""}
      <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${C.tss}">${w.weeklyTSS} TSS</span>`;
    wWrap.appendChild(hdr);

    // Days grid
    const grid=el("div");
    grid.style.cssText="display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:#e8eef6";
    w.days.forEach(d=>{
      const isToday=d.date===today.toISOString().slice(0,10);
      const tc=typeColors[d.type]||C.dim;
      const cell=el("div");
      cell.style.cssText=`padding:8px 10px;background:${isToday?C.accent+"18":d.type==="rest"?"#fafbfc":"#fff"};min-height:72px`;
      const dLabel=el("div");
      dLabel.style.cssText=`font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:${isToday?C.accent:C.dim};margin-bottom:4px`;
      dLabel.textContent=d.day+(isToday?" ◀":"");
      const badge=el("div");
      badge.style.cssText=`display:inline-block;font-size:10px;font-family:'JetBrains Mono',monospace;padding:1px 6px;border-radius:8px;background:${tc}18;color:${tc};border:1px solid ${tc}33;margin-bottom:4px`;
      badge.textContent=typeLabels[d.type]||d.type;
      const desc=el("div");
      desc.style.cssText="font-size:11px;color:#334155;line-height:1.4";
      desc.textContent=d.desc.replace(/\n/g," · ").slice(0,60)+(d.desc.length>60?"…":"");
      const tssSpan=el("div");
      tssSpan.style.cssText=`font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:${d.tss>0?C.tss:C.dim};margin-top:3px`;
      tssSpan.textContent=d.tss>0?`${d.tss} TSS`:"—";
      cell.appendChild(dLabel); cell.appendChild(badge); cell.appendChild(desc); cell.appendChild(tssSpan);
      grid.appendChild(cell);
    });
    wWrap.appendChild(grid);
    calCard.appendChild(wWrap);
  });
  wrap.appendChild(calCard);
  return wrap;
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
